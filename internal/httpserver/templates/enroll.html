{{define "enroll.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container narrow">
    {{with .EnrollPage}}
    <h1>{{.Title}}</h1>
    <p class="lede">{{.Summary}}</p>
    {{if $.HasRootCert}}
    <p><a class="button" href="{{$.RootCertURL}}">Download root certificate</a></p>
    {{else}}
    <p class="muted">No root certificate is currently available for download.</p>
    {{end}}
    <ol>
      {{range .Steps}}<li>{{.}}</li>{{end}}
    </ol>
    {{end}}
    <p><a href="/">Back to landing page</a></p>
  </main>
</body>
</html>
{{end}}
