{{define "enroll.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/">dance</a>
      <nav class="nav-links">
        <a href="/">Overview</a>
        <a class="active" href="/enroll/macos">Enroll</a>
        <a href="/login">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    {{with .EnrollPage}}
    <header class="page-title">
      <h1>{{.Title}}</h1>
      <p class="hint">{{.Summary}}</p>
    </header>

    {{if $.HasRootCert}}
    <section class="section">
      <h2>Downloads</h2>
      <div class="actions">
        <a class="btn primary" href="{{$.RootCertURL}}">Root certificate (PEM)</a>
        <a class="btn" href="/enroll/apple.mobileconfig">Apple profile</a>
        <a class="btn" href="/enroll/windows.ps1">Windows script</a>
        <a class="btn" href="/enroll/linux.sh">Linux script</a>
      </div>
    </section>
    {{end}}

    <section class="section">
      <h2>Steps</h2>
      <ol>
        {{range .Steps}}<li>{{.}}</li>{{end}}
      </ol>
    </section>
    {{end}}
  </main>
</body>
</html>
{{end}}
