{{define "login.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/">dance</a>
      <nav class="nav-links">
        <a href="/">Overview</a>
        <a href="/enroll/macos">Enroll</a>
        <a class="active" href="/login">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container narrow center-content">
    <section class="card" style="width:100%;max-width:380px">
      <header class="page-title">
        <h1>Sign in</h1>
        <p class="subtitle">Sign in to manage certificates and enrollment.</p>
      </header>

      {{if .Error}}<p class="alert error">{{.Error}}</p>{{end}}

      <form method="post" action="/login" class="form">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label>Email<input type="email" name="email" required autofocus></label>
        <label>Password<input type="password" name="password" required></label>
        <div class="actions">
          <button class="btn primary" type="submit">Sign in</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
{{end}}
