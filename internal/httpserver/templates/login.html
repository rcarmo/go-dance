{{define "login.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/"><img src="/static/icon.png" alt="">dance</a>
      <nav class="nav-links">
        <a href="/">Overview</a>
        <a href="/enroll/macos">Enroll</a>
        <a class="active" href="/login">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container narrow center-content">
    <section class="card" style="width:100%;max-width:380px">
      <header class="page-title" style="display:flex;align-items:center;gap:12px">
        <img src="/static/icon.png" alt="dance" style="width:40px;height:40px;border-radius:8px">
        <div>
          <h1 style="font-size:20px;line-height:28px">Sign in to dance</h1>
          <p class="subtitle">Manage certificates and enrollment.</p>
        </div>
      </header>

      {{if .Error}}<p class="alert error">{{.Error}}</p>{{end}}

      <form method="post" action="/login" class="form">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label>Email<input type="email" name="email" required autofocus></label>
        <label>Password<input type="password" name="password" required></label>
        <div class="actions" style="justify-content:flex-end">
          <button class="btn primary" type="submit">Sign in</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
{{end}}
