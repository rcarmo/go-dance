{{define "login.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/"><span class="nav-dot"></span><span>dance</span></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/">Home</a>
        <a href="/enroll/macos">Enroll</a>
        <a href="/login">Admin</a>
      </nav>
    </div>
  </header>
  <main class="container narrow">
    <header class="page-header stack">
      <div class="kicker">Admin access</div>
      <h1>Admin login</h1>
    </header>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="post" action="/login" class="panel form">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Email<input type="email" name="email" required></label>
      <label>Password<input type="password" name="password" required></label>
      <button class="button" type="submit">Sign in</button>
    </form>
    <p class="footer-link"><a href="/">Back</a></p>
  </main>
</body>
</html>
{{end}}
