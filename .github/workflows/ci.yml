name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runs_on: ubuntu-latest
            run_fuzz: true
          - name: arm64
            runs_on: ubuntu-24.04-arm
            run_fuzz: false
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run formatting check
        run: |
          test -z "$(gofmt -l $(find . -name '*.go'))"

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run fuzz smoke test
        if: matrix.run_fuzz
        run: go test -fuzz=FuzzSessionVerify -fuzztime=3s ./internal/httpserver

  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runs_on: ubuntu-latest
            platform: linux/amd64
          - name: arm64
            runs_on: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
